# Optional: drop into nginx server block for Codexify (Next.js)
# Replace any existing Content-Security-Policy that blocks eval/hydration.
#
# sudo nano /etc/nginx/sites-available/codexify
# then: sudo nginx -t && sudo systemctl reload nginx

# Recommended for Next.js App Router (allows hydration):
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https:;" always;

# If you prefer stricter CSP later, remove 'unsafe-eval' only after verifying
# the admin login page hydrates (no stuck "Loading…" and no console CSP errors).
