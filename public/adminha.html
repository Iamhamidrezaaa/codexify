<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ورود ادمین | Codexify</title>
    <link rel="icon" href="/codexify-favicon.ico" />
    <style>
      :root {
        --bg: #0a0b0a;
        --fg: #f5f5f5;
        --muted: #9a9a9a;
        --lime: #c8f02d;
        --lime-ink: #0a0b0a;
        --line: #2a2c2a;
        --card: #101110;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background:
          radial-gradient(
            1200px 600px at 80% -10%,
            rgba(200, 240, 45, 0.08),
            transparent 55%
          ),
          radial-gradient(
            900px 500px at 10% 110%,
            rgba(0, 122, 61, 0.12),
            transparent 50%
          ),
          var(--bg);
        color: var(--fg);
        font-family: Tahoma, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: min(100%, 420px);
        padding: 2rem 1.5rem 1.75rem;
        border: 1px solid var(--line);
        border-radius: 1.25rem;
        background: color-mix(in srgb, var(--card) 92%, black);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.65rem;
        margin-bottom: 1.75rem;
      }

      .brand img {
        height: 2rem;
        width: auto;
      }

      h1 {
        margin: 0 0 0.4rem;
        text-align: center;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .sub {
        margin: 0 0 1.6rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.7;
      }

      label {
        display: block;
        margin-bottom: 0.85rem;
      }

      label span {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 0.8rem;
        color: var(--muted);
      }

      input {
        width: 100%;
        border: 0;
        border-radius: 0.85rem;
        background: #1a1b1a;
        color: var(--fg);
        padding: 0.9rem 1rem;
        font-size: 0.95rem;
        outline: none;
        box-shadow: inset 0 0 0 1px transparent;
        transition: box-shadow 0.2s ease;
      }

      input:focus {
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--lime) 55%, transparent);
      }

      button {
        width: 100%;
        margin-top: 0.65rem;
        border: 0;
        border-radius: 999px;
        background: var(--lime);
        color: var(--lime-ink);
        font-weight: 800;
        font-size: 0.95rem;
        padding: 0.95rem 1rem;
        cursor: pointer;
        transition: filter 0.2s ease, transform 0.15s ease;
      }

      button:hover {
        filter: brightness(1.06);
      }

      button:active {
        transform: scale(0.985);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .error {
        display: none;
        margin: 0 0 1rem;
        padding: 0.75rem 0.9rem;
        border-radius: 0.75rem;
        background: rgba(219, 20, 28, 0.12);
        color: #ff8f93;
        font-size: 0.85rem;
        text-align: center;
      }

      .error.show {
        display: block;
      }

      .back {
        display: block;
        margin-top: 1.1rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
        text-decoration: none;
      }

      .back:hover {
        color: var(--lime);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="/Logo-main-navbar-v2.png" alt="Codexify" />
      </div>
      <h1>ورود به پنل ادمین</h1>
      <p class="sub">ایمیل و رمز عبور خود را وارد کنید.</p>

      <p id="error" class="error" role="alert"></p>

      <form id="login-form" autocomplete="on">
        <label>
          <span>ایمیل</span>
          <input
            id="email"
            name="email"
            type="email"
            required
            dir="ltr"
            placeholder="admin@example.com"
            autocomplete="username"
          />
        </label>
        <label>
          <span>رمز عبور</span>
          <input
            id="password"
            name="password"
            type="password"
            required
            dir="ltr"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </label>
        <button id="submit" type="submit">ورود</button>
      </form>

      <a class="back" href="/">بازگشت به سایت</a>
    </main>

    <script>
      (function () {
        var form = document.getElementById("login-form");
        var errorEl = document.getElementById("error");
        var submitBtn = document.getElementById("submit");

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          errorEl.classList.remove("show");
          errorEl.textContent = "";
          submitBtn.disabled = true;
          submitBtn.textContent = "در حال ورود…";

          try {
            var res = await fetch("/api/admin/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value,
              }),
            });
            var data = {};
            try {
              data = await res.json();
            } catch (_) {}

            if (!res.ok) {
              errorEl.textContent =
                data.error || "ورود ناموفق بود. دوباره تلاش کنید.";
              errorEl.classList.add("show");
              return;
            }

            window.location.href = "/admin/dashboard";
          } catch (_) {
            errorEl.textContent = "خطای شبکه. اتصال را بررسی کنید.";
            errorEl.classList.add("show");
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "ورود";
          }
        });
      })();
    </script>
  </body>
</html>
